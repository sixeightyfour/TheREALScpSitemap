<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCP Sitemap</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="map-search">
      <form id="search-form" class="map-search__form" autocomplete="off">
        <label class="sr-only" for="search-input">Search map</label>
        <input
          id="search-input"
          name="search"
          type="text"
          list="search-options"
          placeholder="Search by Item Number or Place"
        />
        <datalist id="search-options"></datalist>
        <button type="submit">Search</button>
      </form>
      <p id="search-status" class="map-search__status" aria-live="polite"></p>
    </div>

    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="script.js"></script>
  </body>
</html>
